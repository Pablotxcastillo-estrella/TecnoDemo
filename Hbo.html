<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HboMax</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <!-- Botones flotantes lado izquierdo -->
<div class="botones-flotantes">

  <!-- Botón de inicio -->
  <a href="index.html" class="btn-flotante btn-inicio" title="Inicio">🏠</a>

  <!-- Botón de búsqueda -->
  <button class="btn-flotante btn-lupa" onclick="abrirBuscador()" title="Buscar">🔍</button>

  <!-- Botón de WhatsApp -->
  <a 
    href="https://wa.me/50232078619?text=Hola,%20solicito%20servicio%20al%20cliente"
    class="btn-flotante btn-whatsapp"
    target="_blank"
    title="WhatsApp"
  >
    💬
  </a> 
  <a 
  href="https://www.tiktok.com/@tecnodemo0?_r=1&_t=ZS-96B5ytkvPWu"
  class="btn-flotante btn-tiktok"
  target="_blank"
  title="TikTok"
>
  <img src="Tiktok.jpg" alt="TikTok">
</a>

</div>


<!-- Logo flotante lado derecho -->
<a href="index.html" class="logo-flotante">
  <img src="Tecno.jpg" alt="Logo Tecno Demo">
</a>


<!-- Ventana del buscador -->
<div class="buscador-modal" id="buscadorModal">
  <div class="buscador-contenido">

    <button class="cerrar-buscador" onclick="cerrarBuscador()">×</button>

    <h2>Buscar en Tecno Demo</h2>

    <input 
      type="text" 
      id="inputBusqueda" 
      placeholder="Buscar Netflix, DPI, pasaporte, soporte..."
      onkeyup="buscarEnPagina()"
    >

    <div id="resultadosBusqueda"></div>

  </div>
</div>


<!-- Conexión con JavaScript -->
<script src="script.js"></script>
     
    <h1>Planes de HboMax</h1>
    <section class=" contenedor">
        <div class="tarjeta">
            <h2>Plan basico</h2>
            <img src="hbomax.jpg" alt="">
            <p>1 perfil</p>
            <a href="https://wa.me/50232078619?text=Hola%20quiero%20informacion%20sobre%20plan%20basico%20HboMax" target="_blank">comunicate con nosotros</a>
        </div>
    </section>
    
    <section class=" contenedor">
        <div class="tarjeta">
            <h2>Plan Estandar</h2>
            <img src="hbomax.jpg" alt="">
            <p>1 perfil</p>
            <a href="https://wa.me/50232078619?text=Hola%20quiero%20informacion%20sobre%20plan%20estandar%20HboMax" target="_blank">comunicate con nosotros</a>
        </div>
    </section>

    <section class=" contenedor">
        <div class="tarjeta">
            <h2>Plan Premium</h2>
            <img src="hbomax.jpg" alt="">
            <p>1 perfil</p>
            <a href="https://wa.me/50232078619?text=Hola%20quiero%20informacion%20sobre%20plan%20premium%20HboMax" target="_blank">comunicate con nosotros</a>
        </div>
    </section>
    
</body>
</html>
