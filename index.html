<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css"> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoDemo</title>
</head>
<body>
   
    <div class="buscador">
        <input type="text" id="inputBuscar"placeholder="Buscar" onkeyup="buscarServicio()">
        <button onclick="buscarservicio()">Buscar</button>
    </div>
        <section class="hero">
            <div class="hero-texto">
    </div>
    <div class="caja-imagen-principal"> 
        <img src="Tecno.jpg" alt="Logo tecno demo" class="imagen principa;"> 
        <p>Servicios digitales, entretenimiento,tramites y soporte tecnico en un solo lugar</p>
    </div>
        </section>
     
    <section class="contenedor">
        <div class="tarjeta">
            <h2>Entretenimiento</h2>
            <img src="entre.jpg" alt="">
            <a href="Entretenimiento.html" target="_blank">Ver mas</a>
            <p>Descubre nuestros mejores planes en apps</p>
        </div> 

        <div class="tarjeta">
            <h2>Pasaportes</h2>
            <img src="Pasaporte.jpg" alt="">
            <a href="info pas.html">Ver mas</a>
            <p>Citas para pasaportes</p>
        </div> 

        <div class="tarjeta">
            <h2>Renap</h2>
            <img src="Renap.jpg" alt="">
            <a href="Actas.html">Ver mas</a>
            <p>Servicios de Renap</p>
            
        </div> 

        <div class="tarjeta">
            <h2>TecnoDemo</h2> 
            <img src="demo.jpg" alt="">
            <a href="servicios.html">Ver mas</a>
            <p>Reparaciones y Mantenimientos</p>
            
        </div>  
    </section>
    <script>
        function buscarServicio() {

    let texto = document.getElementById("inputBuscar").value.toLowerCase();

    let tarjetas = document.querySelectorAll(".tarjeta");

    tarjetas.forEach(function(tarjeta) {

      let contenido = tarjeta.innerText.toLowerCase();

      if (contenido.includes(texto)) {

        tarjeta.style.display = "flex";

      } else {

        tarjeta.style.display = "none";

      }
    });
  }
    </script>

  
</body>
</html>
