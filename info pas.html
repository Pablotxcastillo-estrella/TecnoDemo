    <title>Tramites Pasaportes</title>

<body> 
     <!-- Botones flotantes lado izquierdo -->
<div class="botones-flotantes">

    <!-- Botón de Inicio -->
      <a href="index.html" class="btn-flotante btn-inicio" title="Inicio">🏠</a>
  <!-- Botón de búsqueda -->
  <button class="btn-flotante btn-lupa" onclick="abrirBuscador()" title="Buscar">🔍</button>

  
  <a 
  href="https://www.tiktok.com/@tecnodemo0?_r=1&_t=ZS-96B5ytkvPWu"

>

</a>

<!-- Burbuja de texto -->
<div class="whatsapp-text">

</div>
<a 
   href="https://wa.me/50232078619?text=Hola,%20solicito%20servicio%20al%20cliente"

    title="TecnoDemo"
    
  >
  
  <img src="wasaro.jpg" alt="Robot">
  </a>
</div>



<!-- Logo flotante lado derecho -->
<a href="index.html" class="logo-flotante">

</a>


<!-- Ventana del buscador -->
<div class="buscador-modal" id="buscadorModal">

    <button class="cerrar-buscador" onclick="cerrarBuscador()">×</button>

    <h2>Buscar en Tecno Demo</h2>

    <input 
      type="text" 
      id="inputBusqueda" 
      placeholder="Buscar en TecnoDemo..."
      onkeyup="buscarEnPagina()"
    >

    <div id="resultadosBusqueda"></div>

  </div>
</div>


<!-- Conexión con JavaScript -->
<script src="script.js"></script>

        <div class="tarjeta">
          <br>
